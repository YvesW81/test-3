name: File-monitor

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: file-monitor
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Haal filedata op
        run: python scripts/fetch_files.py

      - name: Commit en push
        run: |
          git config user.name "file-monitor-bot"
          git config user.email "file-monitor-bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "Geen wijzigingen" || {
            git commit -m "Filedata $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          }
